name: Bug
description: Something behaves incorrectly.
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What went wrong, and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Venue/source involved, run timestamp, logs or snapshot ids if relevant.
    validations:
      required: false
